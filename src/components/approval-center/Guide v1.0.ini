八、总结
你的核心动作（3 件事）：
1. 逐个 Frame 链接生成代码——每次贴一个 Frame 的 Figma 链接，配合 Design Token 让 AI 生成代码
2. 结合 PRD + 设计稿 + Design Token——三者配合使用，确保代码既符合业务逻辑又符合视觉规范
3. 用 Engineering Kickoff 快速拆解——借助 AI 做工程规划，先做核心路径再扩展