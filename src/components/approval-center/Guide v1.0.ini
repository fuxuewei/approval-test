程序员篇：拿到设计稿后如何借助 AI 高效开工
版本：v1.0 适用角色：程序员 语言：中文（English terms in parentheses）

---
文档定位
本文档是给程序员的操作手册，解决一个核心问题：
拿到设计师交付的 Figma 设计稿和 PRD 后，如何借助 AI 编码工具高效地把它变成代码？
在你拿到的设计稿中，设计师已经完成了以下准备工作：
- 清理了无关图层和历史方案
- 对所有图层做了语义命名（组件名 / 部件名 / 状态名）
- 核心页面覆盖了 Default、Empty 等关键状态
- 所有要实现的 Frame 集中在 Figma 的 AI Handoff Page 中
本文档不覆盖设计稿的准备流程——那部分有单独的设计师文档。

---
一、背景：为什么设计稿长这样
1.1 AI Handoff Page
设计师在 Figma 中专门建立了一个 AI Handoff Page，只放需要你实现的 Frame。
这么做的原因是：AI 通过 Figma MCP 读取设计稿时，会扫描整个文件来定位目标节点。如果文件中有大量历史方案和无关页面，AI 会花很多 token 处理噪音，理解准确率下降，生成的代码质量也会变差。
AI Handoff Page 是一个干净的入口，里面只有你需要实现的界面。
1.2 语义命名
设计稿中的图层名已经按照 Component / Part / State 的三级结构做了语义化处理，例如：
审批中心-首页（ApprovalCenter/Home）
 ├ ApprovalTabs
 ├ ApprovalFilterBar
 ├ ApprovalTable
 │  ├ ApprovalTable/Header
 │  └ ApprovalTable/Row
 └ ApprovalDrawer
图层名中的括号部分是英文语义名，直接对应代码组件结构。AI 读取后会自然地按这个结构拆分组件。

---
二、你会拿到什么
完整交付包包含：
暂时无法在飞书文档外展示此内容
三者的分工：
- PRD：定义做什么、业务规则是什么
- AI Handoff Page：定义界面结构和组件关系
- Design Token：定义颜色、字体、间距、圆角等视觉细节

---
三、用 AI 读取设计稿并生成代码
3.1 操作方式：逐个 Frame 链接
每次只给 AI 一个 Frame 的 Figma 链接，让 AI 通过 node-id 精确定位到目标节点。不要一次给多个页面名让 AI 去搜索——那样 AI 需要扫描文件来匹配名称，容易选错或遗漏。
直接贴链接的方式更精准、更简单、出错概率更低。
3.2 提示词模板
以下提示词将"读取设计稿"和"根据 Design Token 生成代码"合并为一步，每次实现一个页面时复制使用：
请根据以下 Figma 设计稿和 MuseDAM Design Tokens 生成组件代码。

设计稿链接：[粘贴单个 Frame 的 Figma 链接]

要求：
- 通过 Figma MCP 读取该 Frame 的设计结构
- 所有颜色、字体、间距、圆角必须严格遵循 MuseDAM Design Tokens
- 包含基础交互：Tab 切换、筛选器展开收起、抽屉/弹窗开关、状态变化
- 使用贴近 MuseDAM 业务场景的真实 mock 数据
- 遵循 B2B SaaS 企业后台的 UI 风格
- 技术栈：React + Tailwind + shadcn/ui
如果同时有 PRD，可以在提示词末尾追加：
补充 PRD：
【粘贴 PRD 内容或相关章节】
3.3 逐页推进
按 AI Handoff Page 中的 Frame 逐个生成代码。建议顺序：先做 Default 状态，确认结构正确后再补 Empty、Loading、Error 等状态。

---
四、Engineering Kickoff
开始实现一个新模块时，可以用以下 Prompt 让 AI 做工程拆解：
你现在是一名资深全栈工程师与工程经理，熟悉 AI-assisted coding、
企业级 SaaS、DAM 系统与后台架构设计。

请基于我提供的 AI-Optimized PRD、Figma 设计稿信息与技术栈信息，
输出一份 Engineering Kickoff Guide。

目标不是写详细技术设计，而是帮助快速理解：
- 应该先做什么
- 核心对象是什么
- 推荐如何拆分模块
- 如何借助 AI 工具高效开工

技术栈：React + Tailwind + shadcn/ui

请按以下结构输出：

## 1. 开发目标概述
用 3-5 句话概括要做什么。

## 2. 核心对象
- 列出系统核心实体
- 说明实体之间的关系

## 3. 建议模块拆分
- 前端组件拆分
- 后端 API / 数据模型建议
- 状态管理建议

## 4. 推荐开发顺序
按从基础到复杂排序，说明为什么这个顺序最合理。

## 5. 设计稿的使用建议
说明 Figma AI Handoff Page 中：
- 哪些部分可以直接参考组件结构和布局
- 哪些只是演示逻辑，实现时需要调整
- 颜色、间距等视觉细节以 Design Token 文档为准

## 6. AI Coding 建议
- 拿到文档后如何使用 AI 辅助实现
- 给出 3-5 条可以直接复制给 AI 的 prompt 示例，例如：
  - "基于以下 PRD 和组件结构，生成 ApprovalTable 组件，
     使用 React + Tailwind + shadcn/ui"
  - "基于以下数据字段定义，生成 TypeScript 类型定义和 mock 数据"

## 7. 实施原则
- 先做核心路径，再补边界情况
- 先做基础数据模型，再做复杂交互
- 避免过早抽象
- 保持与 PRD 中定义的产品逻辑一致

输入材料如下：
1. AI-Optimized PRD
【粘贴内容】

2. 设计稿信息
【粘贴 Figma AI Handoff Page 的节点信息或截图描述】

3. 其他实现背景
【粘贴技术栈约束、已有系统信息等】

---
五、关于 Design Token 的定位
Design Token 文档不需要覆盖整个组件库。它的作用是给 AI 一个视觉约束框架，让生成的代码在核心视觉维度上"看起来像 MuseDAM"。
需要锁死的核心 Token
- 颜色：primary、semantic（success / danger / warning / info）、文本色、背景色、边框色
- 字体层级：标题 / 正文 / 辅助文字的 size 和 weight
- 间距和圆角：spacing scale + 按钮 / 卡片 / 弹窗的 radius
- 交互状态色：hover / active / disabled 时的颜色变化
不需要覆盖的
Select 下拉动画、DatePicker 日历面板、Tree 展开收起等组件细节——这些由你结合项目中的组件库处理。

---
六、MuseDAM 产品设计原则
在实现 MuseDAM 的功能时，请遵循以下原则：
Context First 所有模块都应尽可能成为 Context Source 或 Context Container。
AI Native AI 不是附加按钮，而是系统接口。
Object Model First 所有设计都要围绕对象与关系，而不是围绕页面堆功能。
System Consistency 所有模块都应符合 MuseDAM 的 Content Model、Permission Model、Context Model。
Design System Compliance 所有实现都必须遵循 MuseDAM Design Tokens 与既有产品风格。

