# Figma Design to Frontend Code (Musedam Publishing)

## Overview

将 Figma 设计稿还原为 musedam-publishing 项目的前端代码。核心原则：**复用已有设计系统，禁止修改 shadcn 基础组件，通过 muse 层封装。**

**REQUIRED SUB-SKILL:** 使用 `implement-design` skill 获取 Figma 设计数据（Step 1-4）。本 skill 定义项目特定的规则和约束。

## Required User Input

1. **Figma link URL** — 设计稿的具体页面/frame 链接
2. **交互逻辑描述** — 页面的业务逻辑和用户交互行为

如果用户未提供以上信息，先询问再开始。

## Workflow

```dot
digraph figma_flow {
    rankdir=TB;
    node [shape=box];

    fetch [label="1. implement-design: 获取设计稿+截图"];
    audit [label="2. 审计: 颜色/字体 token 映射"];
    structure [label="3. 分解组件结构 (按 frame 命名)"];
    tokens [label="4. 补充缺失 tokens 到 theme.css/globals.css"];
    install [label="5. shadcn MCP 安装缺失组件"];
    implement [label="6. 编写代码 (ui/ 不可改, muse/ 封装)"];
    logic [label="7. 实现交互逻辑"];

    fetch -> audit -> structure -> tokens -> install -> implement -> logic;
}
```

### Step 1: 获取设计稿

按 `implement-design` skill 的流程执行：解析 URL → `get_design_context` → `get_screenshot` → 下载资产。

### Step 2: 审计 Design Tokens

**颜色映射** — Figma 色值 → `apps/user-panel/app/theme.css` token：

| HEX | Tailwind class | 语义 |
|-----|---------------|------|
| `#f7f9fc` | `bg-basic-light-1` | 浅背景 |
| `#edf1f7` | `bg-basic-light-2` | 次级背景 |
| `#e4e9f2` | `border-basic-light-3` | 边框 |
| `#c5cee0` | `text-basic-light-4` | 禁用/占位 |
| `#8f9bb3` | `text-basic-light-5` | 次要文字 |
| `#2e3a59` | `text-basic-light-6` | 正文 |
| `#222b45` | `text-basic-light-7` | 标题 |
| `#192038` | `text-basic-light-8` | 主要文字 |
| `#151a30` | `text-basic-light-9` | 深色文字 |
| `#101426` | `text-basic-light-10` | 最深文字 |
| `#f2f6ff` | `bg-primary-1` | 主色浅底 |
| `#a6c1ff` | `text-primary-3` | 主色中间 |
| `#598bff` | `text-primary-5` | 主色次级 |
| `#3366ff` | `text-primary-6` / `bg-primary-6` | 主色 |
| `#ff3d71` | `text-danger-6` | 错误/危险 |
| `#00e096` | `text-success-6` | 成功 |

未匹配的色值 → 添加到 `theme.css` 的 `@theme` 块，遵循现有命名模式。

**字体映射** — Figma 文字样式 → `apps/user-panel/app/globals.css` utility class：

| size/weight/lineHeight | class |
|----------------------|-------|
| 22px/semibold/32px | `texth5` |
| 20px/semibold/28px | `texth6` |
| 16px/semibold/24px | `texts1` |
| 16px/normal/24px | `textp1` |
| 14px/medium/22px | `texts2-m` |
| 14px/normal/22px | `textp2` |
| 13px/normal/18px | `textp3` |
| 12px/normal/16px | `textp4` |

未匹配的样式 → 添加到 `globals.css` 的 `@layer utilities` 块。

### Step 3: 分解组件结构

- 组件命名**参照 Figma frame 名称**（转为 PascalCase）
- 简单、无复用价值的结构**不封装为独立组件**，避免过度封装
- 识别哪些部分可用现有 shadcn/muse 组件实现

### Step 4: 补充缺失的 Design Tokens

- **颜色** → `apps/user-panel/app/theme.css` 的 `@theme` 块
- **字体** → `apps/user-panel/app/globals.css` 的 `@layer utilities` 块

### Step 5: 安装缺失的 shadcn 组件

先检查 `apps/user-panel/components/ui/` 目录已有组件。缺失的通过 shadcn MCP 安装：

```
mcp__shadcn__get_add_command_for_items
```

### Step 6: 编写组件代码

**Iron Rules:**

1. **禁止修改** `components/ui/` 下任何文件
2. 自定义样式 → `components/muse/` 下封装（Muse 模式）
3. 组件优先级：已有 muse > 已有 ui > shadcn 安装 > 自写
4. 必须使用 design tokens，禁止硬编码色值/字号
5. 简单结构直接内联

**Muse 封装模式** (参考 `components/muse/checkbox.tsx`)：

```tsx
// components/muse/my-button.tsx
import { Button } from '@/components/ui/button'
import { cn } from '@/lib/utils'

function MuseMyButton({ className, ...props }: React.ComponentProps<typeof Button>) {
  return (
    <Button className={cn('bg-primary-6 textp2', className)} {...props} />
  )
}

export { MuseMyButton }
```

### Step 7: 实现交互逻辑

| 需求 | 方案 |
|------|------|
| 客户端状态 | Zustand |
| 服务端数据 | TanStack React Query |
| 表单 | TanStack Form + Zod |

## Common Mistakes

| 错误 | 正确做法 |
|------|---------|
| 修改 `components/ui/*.tsx` | `components/muse/` 封装覆盖 |
| `text-[#192038]` 硬编码 | `text-basic-light-8` |
| `text-[16px] font-semibold leading-[24px]` | `texts1` |
| 简单 div 封装成组件 | 只在有复用价值时封装 |
| 猜测组件是否存在 | 先检查 `components/ui/` 和 `components/muse/` |
| 手动写基础组件 | shadcn MCP 安装 |
